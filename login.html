<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - 사장픽</title>
    <style>
      :root {
        --naver-green: #03c75a;
        --naver-green-dark: #02b14f;
        --bg: #f7f9fb;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Noto Sans KR", Arial, sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        padding: 40px;
        width: 100%;
        max-width: 400px;
        position: relative;
      }

      .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #666;
      }

      .logo {
        text-align: center;
        font-size: 32px;
        font-weight: 800;
        color: #111827;
        margin-bottom: 10px;
      }

      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 40px;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
        position: relative;
      }

      .form-label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #333;
      }

      .form-input {
        width: 100%;
        padding: 15px;
        border: 2px solid #e1e5e9;
        border-radius: 10px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      .form-input:focus {
        outline: none;
        border-color: #6c5ce7;
      }

      .form-input.valid {
        border-color: #00b894;
      }

      .form-input.invalid {
        border-color: #e17055;
      }

      .validation-message {
        font-size: 12px;
        margin-top: 5px;
        min-height: 18px;
      }

      .validation-message.valid {
        color: #00b894;
      }

      .validation-message.invalid {
        color: #e17055;
      }

      .login-btn {
        width: 100%;
        background: var(--naver-green);
        color: white;
        padding: 15px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-bottom: 20px;
      }

      .login-btn:hover {
        background: var(--naver-green-dark);
        transform: translateY(-2px);
      }

      .login-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .divider {
        text-align: center;
        margin: 30px 0;
        position: relative;
        color: #666;
      }

      .divider::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: #e1e5e9;
      }

      .divider span {
        background: white;
        padding: 0 20px;
      }

      .social-login {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .google-btn,
      .kakao-btn {
        width: 100%;
        padding: 15px;
        border: 2px solid #e1e5e9;
        border-radius: 10px;
        background: white;
        cursor: pointer;
        font-size: 16px;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.3s;
      }

      .google-btn:hover {
        border-color: #db4437;
        color: #db4437;
      }

      .kakao-btn {
        background: transparent;
        border-color: #e1e5e9;
        color: #6b7280;
        text-decoration: underline;
        text-underline-offset: 3px;
        text-decoration-thickness: 1.5px;
      }

      .kakao-btn:hover {
        background: transparent;
        color: #374151;
        text-decoration-thickness: 2px;
      }

      .forgot-password {
        text-align: center;
        margin: 20px 0;
      }

      .forgot-password a {
        color: var(--naver-green);
        text-decoration: none;
        font-size: 14px;
      }

      .signup-link {
        text-align: center;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid #e1e5e9;
        color: #666;
      }

      .signup-link a {
        color: var(--naver-green);
        text-decoration: none;
        font-weight: 600;
      }

      .error-message {
        background: #fee;
        color: #c33;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }

      .success-message {
        background: #efe;
        color: #3a3;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }

      .loading {
        display: none;
        text-align: center;
        margin: 20px 0;
      }

      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid var(--naver-green);
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 480px) {
        .login-container {
          margin: 20px;
          padding: 30px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <button class="back-btn" onclick="location.href='index.html'">←</button>

      <div class="logo">사장픽</div>
      <div class="subtitle">체험단 플랫폼에 오신 것을 환영합니다</div>

      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <!-- 카카오 로그인 전용 화면 -->
      <div class="social-login">
        <button class="kakao-btn" id="kakaoLogin">
          <span>💬</span>
          카카오톡 아이디로 로그인
        </button>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>로그인 중...</p>
      </div>

      <div class="forgot-password">
        <a href="#" id="forgotPassword">비밀번호를 잊으셨나요?</a>
      </div>

      <!-- 부가 로그인 방식 제거 -->

      <div class="signup-link">
        계정이 없으신가요? <a href="join.html">회원가입</a>
      </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        signInWithPopup,
        GoogleAuthProvider,
        sendPasswordResetEmail,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyBb7s8plBL0370UiLtOx8wE_e6NWDLmlKU",
        authDomain: "admin-reviewb.firebaseapp.com",
        projectId: "admin-reviewb",
        storageBucket: "admin-reviewb.firebasestorage.app",
        messagingSenderId: "206964628822",
        appId: "1:206964628822:web:38633eaec9229ee49e0af7",
        measurementId: "G-M8WGJXGQKC",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const googleProvider = new GoogleAuthProvider();

      // DOM elements (kakao-only)
      const kakaoLoginBtn = document.getElementById("kakaoLogin");
      const forgotPasswordLink = document.getElementById("forgotPassword");
      const errorMessage = document.getElementById("errorMessage");
      const successMessage = document.getElementById("successMessage");
      const loading = document.getElementById("loading");

      // Validation functions
      function validateEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
      }

      function validatePassword(password) {
        return password.length >= 6;
      }

      // email/password inputs removed in kakao-only variant

      // email/password inputs removed in kakao-only variant

      // Show error message
      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = "block";
        successMessage.style.display = "none";
      }

      // Show success message
      function showSuccess(message) {
        successMessage.textContent = message;
        successMessage.style.display = "block";
        errorMessage.style.display = "none";
      }

      // Hide messages
      function hideMessages() {
        errorMessage.style.display = "none";
        successMessage.style.display = "none";
      }

      // Show loading
      function showLoading() {
        loading.style.display = "block";
      }

      // Hide loading
      function hideLoading() {
        loading.style.display = "none";
      }

      // Save user data to localStorage
      function saveUserData(user) {
        const userData = {
          uid: user.uid,
          email: user.email,
          displayName: user.displayName || "",
          photoURL: user.photoURL || "",
          emailVerified: user.emailVerified,
          loginTime: new Date().toISOString(),
        };
        localStorage.setItem("userData", JSON.stringify(userData));
        localStorage.setItem("isLoggedIn", "true");
      }

      // email/password login removed

      // google login removed

      // Forgot password
      forgotPasswordLink.addEventListener("click", async (e) => {
        e.preventDefault();

        const email = emailInput.value;
        if (!email) {
          showError("이메일을 먼저 입력해주세요.");
          emailInput.focus();
          return;
        }

        if (!validateEmail(email)) {
          showError("올바른 이메일 형식을 입력해주세요.");
          emailInput.focus();
          return;
        }

        try {
          await sendPasswordResetEmail(auth, email);
          showSuccess(
            "비밀번호 재설정 이메일을 발송했습니다. 이메일을 확인해주세요."
          );
        } catch (error) {
          console.error("비밀번호 재설정 에러:", error);
          let errorMsg = "비밀번호 재설정 이메일 발송에 실패했습니다.";

          if (error.code === "auth/user-not-found") {
            errorMsg = "등록되지 않은 이메일입니다.";
          } else if (error.code === "auth/too-many-requests") {
            errorMsg =
              "너무 많은 요청이 있었습니다. 잠시 후 다시 시도해주세요.";
          }

          showError(errorMsg);
        }
      });

      // Kakao login (improved placeholder)
      kakaoLoginBtn.addEventListener("click", () => {
        window.location.href = "/auth/kakao/login?state=login";
      });

      // Handle callback UX messages
      (function () {
        const params = new URLSearchParams(window.location.search);
        if (params.get("login") === "ok") {
          showSuccess("카카오 로그인에 성공했습니다.");
        }
        if (params.get("error") === "kakao") {
          showError("카카오 로그인 중 오류가 발생했습니다. 다시 시도해주세요.");
        }
      })();

      // Check if user is already logged in
      auth.onAuthStateChanged((user) => {
        if (user) {
          console.log("이미 로그인된 사용자:", user);
          // 이미 로그인된 경우 사용자 데이터 업데이트
          saveUserData(user);
          // 자동으로 홈페이지로 리다이렉트 (선택사항)
          // location.href = 'home.html';
        } else {
          // 로그아웃 상태일 때 localStorage 정리
          localStorage.removeItem("userData");
          localStorage.removeItem("isLoggedIn");
        }
      });

      // no auto-focus (kakao-only)
    </script>
  </body>
</html>
