<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - 사장픽</title>
    <style>
      :root {
        --naver-green: #03c75a;
        --naver-green-dark: #02b14f;
        --bg: #f7f9fb;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Noto Sans KR", Arial, sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        padding: 40px;
        width: 100%;
        max-width: 400px;
        position: relative;
      }

      .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #666;
      }

      .logo {
        text-align: center;
        font-size: 32px;
        font-weight: 800;
        color: #111827;
        margin-bottom: 10px;
      }

      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 40px;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
        position: relative;
      }

      .form-label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #333;
      }

      .form-input {
        width: 100%;
        padding: 15px;
        border: 2px solid #e1e5e9;
        border-radius: 10px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      .form-input:focus {
        outline: none;
        border-color: #6c5ce7;
      }

      .form-input.valid {
        border-color: #00b894;
      }

      .form-input.invalid {
        border-color: #e17055;
      }

      .validation-message {
        font-size: 12px;
        margin-top: 5px;
        min-height: 18px;
      }

      .validation-message.valid {
        color: #00b894;
      }

      .validation-message.invalid {
        color: #e17055;
      }

      .login-btn {
        width: 100%;
        background: var(--naver-green);
        color: white;
        padding: 15px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-bottom: 20px;
      }

      .login-btn:hover {
        background: var(--naver-green-dark);
        transform: translateY(-2px);
      }

      .login-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .divider {
        text-align: center;
        margin: 30px 0;
        position: relative;
        color: #666;
      }

      .divider::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: #e1e5e9;
      }

      .divider span {
        background: white;
        padding: 0 20px;
      }

      .social-login {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .google-btn,
      .kakao-btn {
        width: 100%;
        padding: 15px;
        border: 2px solid #e1e5e9;
        border-radius: 10px;
        background: white;
        cursor: pointer;
        font-size: 16px;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.3s;
      }

      .google-btn:hover {
        border-color: #db4437;
        color: #db4437;
      }

      .kakao-btn {
        background: transparent;
        border-color: #e1e5e9;
        color: #6b7280;
        text-decoration: underline;
        text-underline-offset: 3px;
        text-decoration-thickness: 1.5px;
      }

      .kakao-btn:hover {
        background: transparent;
        color: #374151;
        text-decoration-thickness: 2px;
      }

      .forgot-password {
        text-align: center;
        margin: 20px 0;
      }

      .forgot-password a {
        color: var(--naver-green);
        text-decoration: none;
        font-size: 14px;
      }

      .signup-link {
        text-align: center;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid #e1e5e9;
        color: #666;
      }

      .signup-link a {
        color: var(--naver-green);
        text-decoration: none;
        font-weight: 600;
      }

      .error-message {
        background: #fee;
        color: #c33;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }

      .success-message {
        background: #efe;
        color: #3a3;
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
      }

      .loading {
        display: none;
        text-align: center;
        margin: 20px 0;
      }

      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid var(--naver-green);
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 480px) {
        .login-container {
          margin: 20px;
          padding: 30px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <button class="back-btn" onclick="location.href='index.html'">←</button>

      <div class="logo">사장픽</div>
      <div class="subtitle">체험단 플랫폼에 오신 것을 환영합니다</div>

      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <!-- 이메일 로그인 -->
      <form id="emailLoginForm">
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input
            type="email"
            class="form-input"
            id="emailInput"
            placeholder="이메일을 입력하세요"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input
            type="password"
            class="form-input"
            id="passwordInput"
            placeholder="비밀번호를 입력하세요"
            required
          />
        </div>

        <button type="submit" class="login-btn" id="emailLoginBtn">
          이메일로 로그인
        </button>
      </form>

      <div class="divider"><span>또는</span></div>

      <!-- 카카오 로그인 -->
      <div class="social-login">
        <button class="kakao-btn" id="kakaoLogin">
          <span>💬</span>
          카카오톡 아이디로 로그인
        </button>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>로그인 중...</p>
      </div>

      <div class="forgot-password">
        <a href="#" id="forgotPassword">비밀번호를 잊으셨나요?</a>
      </div>

      <!-- 부가 로그인 방식 제거 -->

      <div class="signup-link">
        계정이 없으신가요? <a href="join.html">회원가입</a>
      </div>
    </div>

    <script>

      // DOM elements
      const emailLoginForm = document.getElementById("emailLoginForm");
      const emailInput = document.getElementById("emailInput");
      const passwordInput = document.getElementById("passwordInput");
      const emailLoginBtn = document.getElementById("emailLoginBtn");
      const kakaoLoginBtn = document.getElementById("kakaoLogin");
      const forgotPasswordLink = document.getElementById("forgotPassword");
      const errorMessage = document.getElementById("errorMessage");
      const successMessage = document.getElementById("successMessage");
      const loading = document.getElementById("loading");

      // Show error message
      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = "block";
        successMessage.style.display = "none";
      }

      // Show success message
      function showSuccess(message) {
        successMessage.textContent = message;
        successMessage.style.display = "block";
        errorMessage.style.display = "none";
      }

      // Hide messages
      function hideMessages() {
        errorMessage.style.display = "none";
        successMessage.style.display = "none";
      }

      // Show loading
      function showLoading() {
        loading.style.display = "block";
      }

      // Hide loading
      function hideLoading() {
        loading.style.display = "none";
      }

      // 간단한 로그인 (localStorage 사용)
      emailLoginForm.addEventListener("submit", (e) => {
        e.preventDefault();
        hideMessages();
        showLoading();

        const email = emailInput.value;
        const password = passwordInput.value;

        // localStorage에서 사용자 목록 가져오기
        const users = JSON.parse(localStorage.getItem("users") || "{}");

        // 사용자 확인
        if (!users[email]) {
          showError("등록되지 않은 이메일입니다. 회원가입을 해주세요.");
          hideLoading();
          return;
        }

        if (users[email].password !== password) {
          showError("비밀번호가 올바르지 않습니다.");
          hideLoading();
          return;
        }

        // 로그인 성공 - 사용자 데이터 저장
        const userData = {
          email: email,
          displayName: email.split("@")[0],
          loginTime: new Date().toISOString(),
        };
        localStorage.setItem("userData", JSON.stringify(userData));
        localStorage.setItem("isLoggedIn", "true");

        showSuccess("로그인에 성공했습니다. 메인 페이지로 이동합니다.");

        setTimeout(() => {
          window.location.href = "index.html";
        }, 1500);

        hideLoading();
      });

      // Save user data to localStorage
      function saveUserData(user) {
        const userData = {
          uid: user.uid,
          email: user.email,
          displayName: user.displayName || "",
          photoURL: user.photoURL || "",
          emailVerified: user.emailVerified,
          loginTime: new Date().toISOString(),
        };
        localStorage.setItem("userData", JSON.stringify(userData));
        localStorage.setItem("isLoggedIn", "true");
      }

      // email/password login removed

      // google login removed

      // Forgot password (비활성화)
      forgotPasswordLink.addEventListener("click", (e) => {
        e.preventDefault();
        showError("비밀번호 재설정은 준비 중입니다.");
      });

      // Kakao 로그인 (비활성화)
      kakaoLoginBtn.addEventListener("click", () => {
        showError("카카오 로그인은 준비 중입니다. 이메일로 로그인해주세요.");
      });
    </script>
  </body>
</html>
